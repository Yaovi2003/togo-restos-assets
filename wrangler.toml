name               = "togo-restos-assets"
main               = "index.js"
compatibility_date = "2026-04-17"

[assets]
directory          = "./public"
binding            = "ASSETS"
run_worker_first   = false
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id      = "64a2ed08ec71466caa418f274ca4402c"

[[r2_buckets]]
binding    = "IMAGES_BUCKET"
bucket_name = "togo-restos-images"