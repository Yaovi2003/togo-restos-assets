<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mes courses — Livreur</title>
    <meta name="robots" content="noindex, nofollow">
	<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://tile.openstreetmap.org;">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <style>
        :root{--gold:#c5a059;--gold-d:rgba(197,160,89,.12);--gold-b:rgba(197,160,89,.28);--bg:#070706;--s:#111110;--s2:#1a1918;--s3:#232220;--line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);--ivory:#f0ece4;--dim:#7a7570;--ok:#2ecc71;--warn:#f39c12;--err:#e74c3c;--r:12px}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;background:var(--bg);color:var(--ivory);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased}
        body{display:flex;flex-direction:column;overflow:hidden}

        /* ── Header ── */
        .top{position:relative;z-index:200;background:rgba(7,7,6,.95);border-bottom:.5px solid var(--line2);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .top-brand{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;color:var(--gold)}
        .top-name{font-size:.8rem;color:var(--dim)}
        .gps-pill{display:flex;align-items:center;gap:5px;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2);border-radius:20px;padding:3px 10px;font-size:.68rem;font-weight:600;color:var(--ok);cursor:pointer;transition:all .15s}
        .gps-pill.off{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:var(--dim)}
        .gps-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
        .gps-pill.on .gps-dot{animation:gpsPulse 1.4s ease-in-out infinite}
        @keyframes gpsPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

        /* ── Layout principal ── */
        .main{flex:1;display:grid;grid-template-rows:1fr auto;overflow:hidden}
        #map{width:100%;height:100%;z-index:1}

        /* ── Panneau bas (courses + chat) ── */
        .bottom-panel{position:relative;z-index:100;background:var(--s);border-top:.5px solid var(--line2);max-height:55vh;overflow-y:auto;flex-shrink:0}
        .bottom-panel::-webkit-scrollbar{width:3px}
        .bottom-panel::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

        /* Tabs */
        .panel-tabs{display:flex;gap:0;border-bottom:.5px solid var(--line2);flex-shrink:0;position:sticky;top:0;background:var(--s);z-index:10}
        .p-tab{flex:1;padding:10px;font-size:.78rem;font-weight:600;color:var(--dim);background:none;border:none;cursor:pointer;font-family:inherit;transition:color .15s;border-bottom:2px solid transparent}
        .p-tab.on{color:var(--gold);border-bottom-color:var(--gold)}

        /* ── Contenu panneau ── */
        .panel-content{padding:12px 14px}
        .p-section{display:none}.p-section.on{display:block}

        /* ── Carte commande mini ── */
        .course-card{background:var(--s2);border:.5px solid var(--line2);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;position:relative}
        .course-card.active{border-color:var(--gold-b)}
        .course-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
        .course-num{width:22px;height:22px;border-radius:50%;background:var(--gold);color:#000;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .course-name{font-size:.88rem;font-weight:600}
        .course-addr{font-size:.75rem;color:var(--dim);margin-top:2px}
        .course-amount{font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:var(--gold);flex-shrink:0}
        .course-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
        .btn-sm{padding:7px 12px;border-radius:8px;font-size:.72rem;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
        .btn-route{background:var(--gold);color:#000}
        .btn-wa{background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.25);color:#25d366}
        .btn-status{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.2);color:var(--ok)}
        .btn-chat{background:rgba(197,160,89,.1);border:1px solid var(--gold-b);color:var(--gold)}
        .btn-sm:hover{opacity:.8}
        .btn-sm:disabled{opacity:.4;pointer-events:none}

        /* ── Multi-courses ── */
        .multi-banner{background:var(--gold-d);border:1px solid var(--gold-b);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;font-size:.8rem;display:flex;align-items:center;gap:8px}

        /* ── Chat ── */
        .chat-order-select{width:100%;background:var(--s2);border:.5px solid var(--line2);color:var(--ivory);padding:8px 12px;border-radius:8px;font-family:inherit;font-size:.82rem;outline:none;margin-bottom:10px}
        .chat-role-tabs{display:flex;gap:6px;margin-bottom:8px}
        .role-tab{flex:1;padding:6px;border-radius:6px;border:.5px solid var(--line2);background:transparent;color:var(--dim);font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
        .role-tab.on{background:var(--gold-d);border-color:var(--gold-b);color:var(--gold)}
        .chat-messages{height:160px;overflow-y:auto;background:var(--s2);border:.5px solid var(--line2);border-radius:8px;padding:8px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
        .chat-messages::-webkit-scrollbar{width:2px}
        .chat-messages::-webkit-scrollbar-thumb{background:var(--line2)}
        .msg{max-width:80%;padding:6px 10px;border-radius:8px;font-size:.78rem;line-height:1.4}
        .msg.mine{background:var(--gold-d);border:1px solid var(--gold-b);color:var(--ivory);align-self:flex-end}
        .msg.theirs{background:var(--s3);border:.5px solid var(--line2);color:var(--ivory);align-self:flex-start}
        .msg-meta{font-size:.64rem;color:var(--dim);margin-top:3px}
        .chat-input-row{display:flex;gap:6px}
        .chat-inp{flex:1;background:var(--s2);border:.5px solid var(--line2);color:var(--ivory);padding:9px 12px;border-radius:8px;font-family:inherit;font-size:.82rem;outline:none;transition:border-color .2s}
        .chat-inp:focus{border-color:var(--gold)}
        .chat-send{background:var(--gold);color:#000;border:none;padding:9px 14px;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer;font-family:inherit}

        /* ── Toast ── */
        #toast-wrap{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}
        .toast{background:var(--s2);border:.5px solid var(--line2);border-radius:50px;padding:8px 18px;font-size:.78rem;font-weight:600;white-space:nowrap;animation:tIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.4)}
        @keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        /* ── Loading / Error ── */
        #state-loading,#state-error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:500;background:var(--bg);text-align:center;padding:20px}
        #state-error{display:none}
        .spin{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold-b);border-top-color:var(--gold);animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>

<div id="state-loading"><div class="spin"></div><p style="color:var(--dim);font-size:.88rem;">Chargement…</p></div>
<div id="state-error"><span style="font-size:2rem;">⚠️</span><p id="err-msg" style="font-size:.85rem;color:var(--dim);"></p></div>

<div class="top" id="main-top" style="display:none;">
    <span class="top-brand">🛵 Livreur</span>
    <span class="top-name" id="drv-name">—</span>
    <div class="gps-pill off" id="gps-pill" onclick="toggleGPS()">
        <div class="gps-dot"></div>
        <span id="gps-lbl">GPS off</span>
    </div>
</div>

<div class="main" id="main-layout" style="display:none;">
    <div id="map"></div>

    <div class="bottom-panel">
        <div class="panel-tabs">
            <button class="p-tab on" onclick="switchTab('courses',this)">🛵 Courses</button>
            <button class="p-tab"    onclick="switchTab('chat',this)">💬 Chat</button>
        </div>

        <!-- COURSES -->
        <div class="p-section on panel-content" id="tab-courses">
            <div id="multi-banner" style="display:none;" class="multi-banner">
                📍 Tournée optimisée — suivez l'ordre indiqué
            </div>
            <div id="courses-list"></div>
        </div>

        <!-- CHAT -->
        <div class="p-section panel-content" id="tab-chat">
            <select class="chat-order-select" id="chat-order-sel" onchange="loadChat()">
                <option value="">— Sélectionnez une commande —</option>
            </select>
            <div class="chat-role-tabs">
                <button class="role-tab on" onclick="setChatRole('staff',this)">👔 Staff</button>
                <button class="role-tab"    onclick="setChatRole('client',this)">👤 Client</button>
            </div>
            <div class="chat-messages" id="chat-msgs"></div>
            <div class="chat-input-row">
                <input type="text" class="chat-inp" id="chat-inp"
                    placeholder="Votre message…" maxlength="500"
                    onkeydown="if(event.key==='Enter')sendMsg()">
                <button class="chat-send" onclick="sendMsg()">Envoyer</button>
            </div>
        </div>
    </div>
</div>

<div id="toast-wrap"></div>

<script>
'use strict';

let db=null, person=null, map=null;
let gpsWatchId=null, gpsActive=false;
let orders=[], markers={}, routeLayer=null, chatChannel=null;
let chatOrderId=null, chatRole='staff';

const fmt=n=>Number(n).toLocaleString('fr-FR').replace(/\u202F/g,' ')+' FCFA';
function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function qs(id){return document.getElementById(id)}
function toast(msg,dur=3000){const w=qs('toast-wrap');w.innerHTML=`<div class="toast">${msg}</div>`;setTimeout(()=>w.innerHTML='',dur)}

function showState(id){
    ['state-loading','state-error'].forEach(s=>qs(s).style.display=s===id?'flex':'none');
    const mainTop=qs('main-top'),mainLayout=qs('main-layout');
    if(id==='main'){mainTop.style.display='flex';mainLayout.style.display='grid';}
}

/* ── Tabs ── */
function switchTab(id,btn){
    document.querySelectorAll('.p-tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.p-section').forEach(s=>s.classList.remove('on'));
    btn.classList.add('on');
    qs('tab-'+id).classList.add('on');
}

/* ══ INIT ══ */
(async()=>{
    const params=new URLSearchParams(location.search);
    const pid=params.get('id');
    if(!pid||!/^[0-9a-f-]{36}$/i.test(pid)){
        qs('err-msg').textContent='Lien invalide.';showState('state-error');return;
    }
    try{
        await CONFIG.load();
        db=supabase.createClient(CONFIG.supabaseUrl,CONFIG.supabaseKey);
    }catch(e){qs('err-msg').textContent='Connexion impossible.';showState('state-error');return;}

    const{data:p,error}=await db.from('delivery_persons').select('id,name,phone').eq('id',pid).single();
    if(error||!p){qs('err-msg').textContent='Livreur introuvable.';showState('state-error');return;}
    person=p;
    qs('drv-name').textContent=p.name;
    document.title=`${p.name} — Courses`;
    showState('main');
    initMap();
    await loadOrders();
    startRealtime();
})();

/* ══ CARTE ══ */
function initMap(){
    map=L.map('map',{zoomControl:false,attributionControl:false});
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
    L.control.zoom({position:'topright'}).addTo(map);
    map.setView([6.1375,1.2123],13); /* Lomé centre */
}

/* ══ COMMANDES ══ */
async function loadOrders(){
    const today=new Date().toISOString().split('T')[0];
    const{data,error}=await db
        .from('orders')
        .select('id,customer_name,customer_phone,customer_address,customer_lat,customer_lng,total,status,restaurant_id,restaurants(name,lat,lng)')
        .eq('delivery_person_id',person.id)
        .gte('created_at',today)
        .neq('status','livré')
        .order('created_at',{ascending:true});

    orders=data||[];
    renderCourses();
    updateMapMarkers();
    populateChatSelect();
}

function renderCourses(){
    const list=qs('courses-list');
    if(!orders.length){
        list.innerHTML='<div style="text-align:center;padding:24px;color:var(--dim);font-size:.85rem;">Aucune course en attente.</div>';
        qs('multi-banner').style.display='none';
        return;
    }

    /* Optimiser l'ordre si > 1 commande */
    let sorted=orders;
    if(orders.length>1 && orders[0]?.restaurants?.lat){
        sorted=_optimizeRoute(orders);
        qs('multi-banner').style.display='flex';
    }

    list.innerHTML=sorted.map((o,i)=>{
        const phone=String(o.customer_phone||'').replace(/[^0-9+]/g,'');
        const addr=o.customer_address||'Adresse non renseignée';
        const hasGPS=o.customer_lat&&o.customer_lng;
        return`<div class="course-card${i===0?' active':''}" id="course-${o.id}">
            <div class="course-head">
                <div class="course-num">${i+1}</div>
                <div style="flex:1">
                    <div class="course-name">${esc(o.customer_name||'Client')}</div>
                    <div class="course-addr">📍 ${esc(addr.substring(0,60))}</div>
                </div>
                <span class="course-amount">${fmt(o.total||0)}</span>
            </div>
            <div class="course-actions">
                ${hasGPS?`<button class="btn-sm btn-route" onclick="goToOrder('${o.id}')">🗺️ Y aller</button>`:''}
                ${phone?`<button class="btn-sm btn-wa" onclick="window.open('https://wa.me/${phone}','_blank','noopener')">📲 WA</button>`:''}
                <button class="btn-sm btn-chat" onclick="openChatFor('${o.id}')">💬 Chat</button>
                <button class="btn-sm btn-status" onclick="markDelivered('${o.id}')">✅ Livré</button>
            </div>
        </div>`;
    }).join('');
}

function updateMapMarkers(){
    if(!map)return;
    /* Nettoyer les anciens marqueurs */
    Object.values(markers).forEach(m=>map.removeLayer(m));
    markers={};

    const bounds=[];
    orders.forEach((o,i)=>{
        if(!o.customer_lat||!o.customer_lng)return;
        const icon=L.divIcon({
            html:`<div style="background:var(--gold,#c5a059);color:#000;width:22px;height:22px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.4);">${i+1}</div>`,
            iconSize:[22,22],iconAnchor:[11,11],className:''
        });
        const m=L.marker([o.customer_lat,o.customer_lng],{icon}).addTo(map);
        m.bindPopup(`<b>${esc(o.customer_name||'Client')}</b><br>${esc(o.customer_address||'')}`,{className:'dark-popup'});
        markers[o.id]=m;
        bounds.push([o.customer_lat,o.customer_lng]);
    });

    if(bounds.length){map.fitBounds(bounds,{padding:[30,30]});}
    drawRoute(orders);
}

function drawRoute(sortedOrders){
    if(routeLayer)map.removeLayer(routeLayer);
    const pts=sortedOrders
        .filter(o=>o.customer_lat&&o.customer_lng)
        .map(o=>[o.customer_lat,o.customer_lng]);
    if(pts.length<2)return;
    routeLayer=L.polyline(pts,{color:'#c5a059',weight:2,dashArray:'6,4',opacity:.6}).addTo(map);
}

/* ── Optimisation de la tournée (algorithme du plus proche voisin) ── */
function _haversine(lat1,lng1,lat2,lng2){
    const R=6371,toR=d=>d*Math.PI/180;
    const dLat=toR(lat2-lat1),dLng=toR(lng2-lng1);
    const a=Math.sin(dLat/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLng/2)**2;
    return R*2*Math.asin(Math.sqrt(a));
}

function _optimizeRoute(orders){
    if(orders.length<=1)return orders;
    /* Point de départ : position GPS livreur ou premier restaurant */
    let cur={lat:orders[0].restaurants?.lat,lng:orders[0].restaurants?.lng};
    if(!cur.lat)return orders;
    const remaining=[...orders];
    const result=[];
    while(remaining.length){
        let nearestIdx=0,nearestDist=Infinity;
        remaining.forEach((o,i)=>{
            if(!o.customer_lat)return;
            const d=_haversine(cur.lat,cur.lng,o.customer_lat,o.customer_lng);
            if(d<nearestDist){nearestDist=d;nearestIdx=i;}
        });
        const next=remaining.splice(nearestIdx,1)[0];
        result.push(next);
        if(next.customer_lat)cur={lat:next.customer_lat,lng:next.customer_lng};
    }
    return result;
}

window.goToOrder=function(orderId){
    const o=orders.find(x=>x.id===orderId);
    if(!o?.customer_lat)return;
    map.setView([o.customer_lat,o.customer_lng],17,{animate:true});
    markers[orderId]?.openPopup();
    const mapsUrl=`https://maps.google.com/?q=${o.customer_lat},${o.customer_lng}`;
    window.open(mapsUrl,'_blank','noopener');
};

window.markDelivered=async function(orderId){
    const btn=document.querySelector(`#course-${orderId} .btn-status`);
    if(btn){btn.disabled=true;btn.textContent='⏳…';}
    try{
        await db.from('orders').update({status:'livré'}).eq('id',orderId);
        orders=orders.filter(o=>o.id!==orderId);
        if(markers[orderId])map.removeLayer(markers[orderId]);
        toast('✅ Commande marquée livrée !');
        renderCourses();updateMapMarkers();
    }catch(e){toast('❌ Erreur: '+e.message);if(btn){btn.disabled=false;btn.textContent='✅ Livré';}}
};

/* ══ GPS BROADCAST ══ */
window.toggleGPS=function(){
    if(gpsActive){_stopGPS();}else{_startGPS();}
};

function _startGPS(){
    if(!navigator.geolocation){toast('GPS non disponible.');return;}
    gpsWatchId=navigator.geolocation.watchPosition(
        pos=>{
            const{latitude:lat,longitude:lng,heading,speed}=pos.coords;
            _broadcastPosition(lat,lng,heading,speed);
            /* Marqueur livreur */
            _updateDriverMarker(lat,lng);
        },
        err=>{toast('GPS: '+err.message);_stopGPS();},
        {enableHighAccuracy:true,timeout:15000,maximumAge:5000}
    );
    gpsActive=true;
    qs('gps-pill').classList.remove('off');qs('gps-pill').classList.add('on');
    qs('gps-lbl').textContent='GPS on';
    toast('📍 GPS activé — position diffusée');
}

function _stopGPS(){
    if(gpsWatchId!==null)navigator.geolocation.clearWatch(gpsWatchId);
    gpsActive=false;
    qs('gps-pill').classList.add('off');qs('gps-pill').classList.remove('on');
    qs('gps-lbl').textContent='GPS off';
}

let _driverMarker=null;
function _updateDriverMarker(lat,lng){
    if(!map)return;
    const icon=L.divIcon({
        html:'<div style="background:#3498db;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);"></div>',
        iconSize:[16,16],iconAnchor:[8,8],className:''
    });
    if(_driverMarker){_driverMarker.setLatLng([lat,lng]);}
    else{_driverMarker=L.marker([lat,lng],{icon}).addTo(map).bindTooltip('Moi',{permanent:false});}
}

let _lastBroadcast=0;
async function _broadcastPosition(lat,lng,heading,speed){
    const now=Date.now();
    if(now-_lastBroadcast<12000)return; /* max 1 update / 12 secondes */
    _lastBroadcast=now;
    if(!orders.length)return;
    try{
        const rows=orders.map(o=>({
            delivery_person_id:person.id,
            order_id:o.id,
            lat,lng,
            heading:heading||null,
            speed:speed?Math.round(speed*3.6):null,
            updated_at:new Date().toISOString()
        }));
        /* Upsert pour éviter les doublons par (delivery_person_id,order_id) */
        await db.from('delivery_tracking').upsert(rows,{onConflict:'delivery_person_id,order_id'});
    }catch(_){}
}

/* ══ CHAT ══ */
function populateChatSelect(){
    const sel=qs('chat-order-sel');
    sel.innerHTML='<option value="">— Sélectionnez —</option>';
    orders.forEach(o=>{
        const opt=document.createElement('option');
        opt.value=o.id;opt.textContent=`#${o.id.substring(0,8).toUpperCase()} — ${o.customer_name||'Client'}`;
        sel.appendChild(opt);
    });
}

window.openChatFor=function(orderId){
    qs('chat-order-sel').value=orderId;
    switchTab('chat',document.querySelectorAll('.p-tab')[1]);
    loadChat();
};

window.setChatRole=function(role,btn){
    chatRole=role;
    document.querySelectorAll('.role-tab').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
};

window.loadChat=async function(){
    chatOrderId=qs('chat-order-sel').value;
    if(!chatOrderId){qs('chat-msgs').innerHTML='';return;}

    const{data}=await db.from('delivery_chats')
        .select('id,sender_role,sender_name,message,created_at')
        .eq('order_id',chatOrderId)
        .order('created_at',{ascending:true})
        .limit(50);

    _renderMessages(data||[]);

    /* Realtime chat */
    if(chatChannel)db.removeChannel(chatChannel);
    chatChannel=db.channel(`chat-${chatOrderId}`)
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'delivery_chats',filter:`order_id=eq.${chatOrderId}`},
            payload=>{
                const msgs=qs('chat-msgs');
                msgs.appendChild(_msgEl(payload.new));
                msgs.scrollTop=msgs.scrollHeight;
                if('vibrate' in navigator)navigator.vibrate([50]);
            })
        .subscribe();
};

function _renderMessages(msgs){
    const el=qs('chat-msgs');
    el.innerHTML='';
    if(!msgs.length){el.innerHTML='<div style="text-align:center;color:var(--dim);font-size:.78rem;padding:16px;">Aucun message.</div>';return;}
    msgs.forEach(m=>el.appendChild(_msgEl(m)));
    el.scrollTop=el.scrollHeight;
}

function _msgEl(m){
    const div=document.createElement('div');
    const isMine=m.sender_role==='livreur';
    div.className=`msg ${isMine?'mine':'theirs'}`;
    const time=new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    div.innerHTML=`<div>${esc(m.message)}</div><div class="msg-meta">${esc(m.sender_name||m.sender_role)} · ${time}</div>`;
    return div;
}

window.sendMsg=async function(){
    const inp=qs('chat-inp');
    const msg=inp.value.trim();
    if(!msg||!chatOrderId)return;
    inp.value='';
    try{
        await db.from('delivery_chats').insert({
            order_id:chatOrderId,
            sender_role:'livreur',
            sender_name:person.name,
            message:msg,
        });
    }catch(e){toast('Erreur envoi: '+e.message);}
};

/* ══ REALTIME ══ */
function startRealtime(){
    db.channel(`livreur-orders-${person.id}`)
        .on('postgres_changes',{event:'*',schema:'public',table:'orders',filter:`delivery_person_id=eq.${person.id}`},
            ()=>{loadOrders();toast('🔔 Mise à jour des courses !')})
        .subscribe();
}

window.addEventListener('beforeunload',()=>_stopGPS());
</script>
</body>
</html>
