<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Suivi de commande — Restos Lomé</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cdn.jsdelivr.net https://tile.openstreetmap.org;">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>

    <style>
        :root{
            --gold:#c5a059;--gold-d:rgba(197,160,89,.12);--gold-b:rgba(197,160,89,.28);
            --bg:#070706;--s:#111110;--s2:#1a1918;--s3:#232220;
            --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);
            --ivory:#f0ece4;--dim:#7a7570;--muted:#4a4642;
            --ok:#2ecc71;--warn:#f39c12;--err:#e74c3c;--r:12px;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;background:var(--bg);color:var(--ivory);-webkit-font-smoothing:antialiased}
        body{font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;overflow:hidden}

        /* ── Header ── */
        .top{z-index:200;background:rgba(7,7,6,.92);backdrop-filter:blur(14px);border-bottom:.5px solid var(--line2);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .top-brand{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:800;color:var(--gold)}
        .back-btn{background:none;border:none;color:var(--dim);font-size:.8rem;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px;transition:color .15s}
        .back-btn:hover{color:var(--ivory)}

        /* ── ETA Banner ── */
        .eta-bar{background:linear-gradient(135deg,rgba(197,160,89,.15),rgba(197,160,89,.06));border-bottom:1px solid rgba(197,160,89,.2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
        .eta-main{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--gold)}
        .eta-sub{font-size:.72rem;color:rgba(197,160,89,.65);margin-top:2px}
        .live-badge{display:flex;align-items:center;gap:5px;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2);border-radius:20px;padding:4px 10px;font-size:.68rem;font-weight:600;color:var(--ok)}
        .live-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:livePulse 1.4s ease-in-out infinite}
        @keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

        /* ── Layout ── */
        .content{flex:1;display:flex;flex-direction:column;overflow:hidden}
        #map{flex:1;z-index:1;min-height:200px}

        /* ── Panneau bas ── */
        .bottom{background:var(--s);border-top:.5px solid var(--line2);max-height:52vh;overflow-y:auto;flex-shrink:0}
        .bottom::-webkit-scrollbar{width:3px}
        .bottom::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

        .panel-tabs{display:flex;border-bottom:.5px solid var(--line2);position:sticky;top:0;background:var(--s);z-index:10}
        .p-tab{flex:1;padding:10px;font-size:.78rem;font-weight:600;color:var(--dim);background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;transition:color .15s}
        .p-tab.on{color:var(--gold);border-bottom-color:var(--gold)}

        .panel-body{padding:14px 16px}
        .p-sec{display:none}.p-sec.on{display:block}

        /* ── Timeline statut ── */
        .timeline{display:flex;flex-direction:column;gap:0;margin-bottom:8px}
        .tl-step{display:flex;align-items:flex-start;gap:12px;position:relative}
        .tl-step:not(:last-child)::after{content:'';position:absolute;left:14px;top:28px;width:2px;height:calc(100% - 10px);background:var(--line2);transition:background .4s}
        .tl-step.done:not(:last-child)::after{background:var(--gold-b)}
        .tl-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--line2);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;z-index:1;transition:all .3s}
        .tl-step.done   .tl-dot{border-color:var(--gold-b);background:var(--gold-d)}
        .tl-step.active .tl-dot{border-color:var(--gold);background:var(--gold-d);animation:dotPulse 2s ease-in-out infinite}
        @keyframes dotPulse{0%,100%{box-shadow:0 0 0 3px rgba(197,160,89,.15)}50%{box-shadow:0 0 0 7px rgba(197,160,89,.05)}}
        .tl-body{flex:1;padding:4px 0 20px}
        .tl-step:last-child .tl-body{padding-bottom:4px}
        .tl-label{font-size:.88rem;font-weight:600;color:var(--muted);transition:color .3s}
        .tl-step.done   .tl-label{color:var(--dim)}
        .tl-step.active .tl-label{color:var(--gold)}
        .tl-sub{font-size:.72rem;color:var(--muted);margin-top:3px}
        .tl-step.active .tl-sub{color:var(--dim)}

        /* ── Infos commande ── */
        .info-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--line);font-size:.83rem}
        .info-row:last-child{border-bottom:none}
        .info-icon{width:18px;text-align:center;flex-shrink:0;color:var(--gold)}
        .info-lbl{color:var(--dim);width:80px;flex-shrink:0}
        .info-val{flex:1;word-break:break-word}
        .info-val.mono{font-family:'IBM Plex Mono',monospace;color:var(--gold)}

        /* ── Chat livreur ── */
        .chat-msgs{height:150px;overflow-y:auto;background:var(--s2);border:.5px solid var(--line2);border-radius:8px;padding:8px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
        .chat-msgs::-webkit-scrollbar{width:2px}
        .chat-msgs::-webkit-scrollbar-thumb{background:var(--line2)}
        .msg{max-width:80%;padding:6px 10px;border-radius:8px;font-size:.78rem;line-height:1.4}
        .msg.mine{background:var(--gold-d);border:1px solid var(--gold-b);align-self:flex-end}
        .msg.theirs{background:var(--s3);border:.5px solid var(--line2);align-self:flex-start}
        .msg-meta{font-size:.64rem;color:var(--dim);margin-top:3px}
        .chat-inp-row{display:flex;gap:6px}
        .chat-inp{flex:1;background:var(--s2);border:.5px solid var(--line2);color:var(--ivory);padding:9px 12px;border-radius:8px;font-family:inherit;font-size:.82rem;outline:none;transition:border-color .2s}
        .chat-inp:focus{border-color:var(--gold)}
        .chat-send{background:var(--gold);color:#000;border:none;padding:9px 14px;border-radius:8px;font-weight:700;font-size:.8rem;cursor:pointer;font-family:inherit;transition:opacity .2s}
        .chat-send:hover{opacity:.88}

        /* ── Contact ── */
        .contact-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
        .btn-contact{padding:10px 16px;border-radius:10px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;text-decoration:none;transition:opacity .2s}
        .btn-contact:hover{opacity:.85}
        .btn-wa{background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.25);color:#25d366}
        .btn-maps{background:rgba(52,152,219,.12);border:1px solid rgba(52,152,219,.25);color:#3498db}

        /* ── États ── */
        #state-loading,#state-error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:500;background:var(--bg);text-align:center;padding:20px}
        #state-error{display:none}
        .spin{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold-b);border-top-color:var(--gold);animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ── Toast ── */
        #toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none}
        .toast{background:var(--s2);border:.5px solid var(--line2);border-radius:50px;padding:8px 18px;font-size:.78rem;font-weight:600;white-space:nowrap;animation:tIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.4)}
        @keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

        /* Leaflet dark */
        .leaflet-popup-content-wrapper{background:var(--s2)!important;color:var(--ivory)!important;border:.5px solid var(--line2)!important;border-radius:10px!important;box-shadow:0 4px 16px rgba(0,0,0,.4)!important}
        .leaflet-popup-tip{background:var(--s2)!important}
    </style>
</head>
<body>

<div id="state-loading"><div class="spin"></div><p style="color:var(--dim);font-size:.88rem;">Chargement…</p></div>
<div id="state-error"><span style="font-size:2rem;">⚠️</span><p id="err-txt" style="color:var(--dim);font-size:.85rem;max-width:280px;line-height:1.6;"></p></div>

<div class="top" id="main-top" style="display:none;">
    <button class="back-btn" onclick="history.back()">← Retour</button>
    <span class="top-brand">📦 Suivi commande</span>
    <span style="width:60px;"></span>
</div>

<div class="eta-bar" id="eta-bar" style="display:none;">
    <div>
        <div class="eta-main" id="eta-main">En préparation…</div>
        <div class="eta-sub"  id="eta-sub">Le livreur n'est pas encore parti</div>
    </div>
    <div class="live-badge"><div class="live-dot"></div><span>Live</span></div>
</div>

<div class="content" id="main-content" style="display:none;">
    <div id="map"></div>

    <div class="bottom">
        <div class="panel-tabs">
            <button class="p-tab on" onclick="switchTab('status',this)">📋 Statut</button>
            <button class="p-tab"    onclick="switchTab('info',this)">🧾 Commande</button>
            <button class="p-tab"    onclick="switchTab('chat',this)">💬 Livreur</button>
        </div>

        <!-- Statut -->
        <div class="p-sec on panel-body" id="tab-status">
            <div class="timeline" id="timeline"></div>
        </div>

        <!-- Infos commande -->
        <div class="p-sec panel-body" id="tab-info">
            <div id="order-info-rows"></div>
            <div class="contact-row" id="contact-row"></div>
        </div>

        <!-- Chat livreur -->
        <div class="p-sec panel-body" id="tab-chat">
            <div class="chat-msgs" id="chat-msgs">
                <div style="text-align:center;color:var(--dim);font-size:.78rem;padding:16px;">Chargement du chat…</div>
            </div>
            <div class="chat-inp-row">
                <input type="text" class="chat-inp" id="chat-inp" placeholder="Message au livreur…"
                    maxlength="500" onkeydown="if(event.key==='Enter')sendMsg()">
                <button class="chat-send" onclick="sendMsg()">Envoyer</button>
            </div>
        </div>
    </div>
</div>

<div id="toast-wrap"></div>

<script>
'use strict';

let db=null, map=null, order=null, chatChannel=null, trackingChannel=null;
let driverMarker=null, clientMarker=null, routeLine=null;

const STEPS=[
    {key:'confirmé',      icon:'✅',label:'Commande confirmée',  sub:'Votre commande a été reçue.'},
    {key:'en_préparation',icon:'👨‍🍳',label:'En préparation',      sub:'Le chef est en cuisine.'},
    {key:'prêt',          icon:'🍽️', label:'Prêt à partir',       sub:'Votre commande est prête.'},
    {key:'en_route',      icon:'🛵',label:'En route',             sub:'Le livreur est en chemin.'},
    {key:'livré',         icon:'🎉',label:'Livré',                sub:'Commande livrée. Bon appétit !'},
];
const STATUS_ORDER=STEPS.map(s=>s.key);

const fmt=n=>Number(n).toLocaleString('fr-FR').replace(/\u202F/g,' ')+' FCFA';
function esc(s){const d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML}
function qs(id){return document.getElementById(id)}

function toast(msg,dur=3500){
    const w=qs('toast-wrap');w.innerHTML=`<div class="toast">${msg}</div>`;
    setTimeout(()=>w.innerHTML='',dur);
}

function switchTab(id,btn){
    document.querySelectorAll('.p-tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.p-sec').forEach(s=>s.classList.remove('on'));
    btn.classList.add('on');qs('tab-'+id).classList.add('on');
    if(id==='chat')loadChat();
}

function showState(id){
    ['state-loading','state-error'].forEach(s=>qs(s).style.display=s===id?'flex':'none');
    const isMain=id==='main';
    qs('main-top').style.display=isMain?'flex':'none';
    qs('main-content').style.display=isMain?'flex':'none';
    qs('eta-bar').style.display=isMain?'flex':'none';
}

/* ═══ INIT ═══ */
(async()=>{
    const params=new URLSearchParams(location.search);
    const orderId=params.get('id');
    if(!orderId||!/^[0-9a-f-]{36}$/i.test(orderId)){
        qs('err-txt').textContent='Lien de suivi invalide.';showState('state-error');return;
    }
    try{
        await CONFIG.load();
        db=supabase.createClient(CONFIG.supabaseUrl,CONFIG.supabaseKey);
    }catch(e){qs('err-txt').textContent='Service indisponible.';showState('state-error');return;}

    try{
        const{data,error}=await db.from('orders')
            .select(`id,customer_name,customer_phone,customer_address,customer_lat,customer_lng,
                     total,status,payment_method,delivery_type,delivery_person_id,
                     restaurants(name,lat,lng,logo_url,whatsapp),
                     order_items(item_name,quantity,item_price)`)
            .eq('id',orderId).single();

        if(error||!data){qs('err-txt').textContent='Commande introuvable.';showState('state-error');return;}
        order=data;
        showState('main');
        initMap();
        // Forcer Leaflet à recalculer après rendu du conteneur
        setTimeout(() => { if (map) map.invalidateSize(); }, 150);
        renderTimeline(order.status);
        renderOrderInfo();
        updateETA(order.status,null);
        loadDriverPosition();
        startRealtime();
    }catch(e){
        qs('err-txt').textContent='Impossible de charger la commande.';showState('state-error');
    }
})();

/* ═══ CARTE ═══ */
function initMap(){
    map=L.map('map',{zoomControl:false,attributionControl:false});
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

    const bounds=[];

    /* Marqueur restaurant */
    const resto=order.restaurants;
    if(resto?.lat&&resto?.lng){
        const rIcon=L.divIcon({
            html:`<div style="background:#e74c3c;width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);"></div>`,
            iconSize:[14,14],iconAnchor:[7,7],className:''
        });
        L.marker([resto.lat,resto.lng],{icon:rIcon}).addTo(map)
            .bindPopup(`<b>🍽️ ${esc(resto.name)}</b>`,{className:'dark-popup'});
        bounds.push([resto.lat,resto.lng]);
    }

    /* Marqueur client */
    if(order.customer_lat&&order.customer_lng){
        const cIcon=L.divIcon({
            html:'<div style="background:var(--gold,#c5a059);width:14px;height:14px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.4);"></div>',
            iconSize:[14,14],iconAnchor:[7,7],className:''
        });
        clientMarker=L.marker([order.customer_lat,order.customer_lng],{icon:cIcon}).addTo(map)
            .bindPopup('<b>📍 Votre adresse</b>',{className:'dark-popup'});
        bounds.push([order.customer_lat,order.customer_lng]);
    }

    if(bounds.length)map.fitBounds(bounds,{padding:[30,30]});
    else map.setView([6.1375,1.2123],13);
}

function _updateDriverOnMap(lat,lng){
    if(!map)return;
    const icon=L.divIcon({
        html:'<div style="background:#3498db;width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:9px;">🛵</div>',
        iconSize:[18,18],iconAnchor:[9,9],className:''
    });
    if(driverMarker){driverMarker.setLatLng([lat,lng]);}
    else{
        driverMarker=L.marker([lat,lng],{icon}).addTo(map)
            .bindPopup('<b>🛵 Votre livreur</b>',{className:'dark-popup'});
    }

    /* Ligne livreur → client */
    if(order.customer_lat&&order.customer_lng){
        if(routeLine)map.removeLayer(routeLine);
        routeLine=L.polyline([[lat,lng],[order.customer_lat,order.customer_lng]],
            {color:'#3498db',weight:2,dashArray:'5,4',opacity:.5}).addTo(map);

        /* Calculer ETA en temps réel */
        const dist=_haversine(lat,lng,order.customer_lat,order.customer_lng);
        const mins=Math.max(1,Math.round(dist/25*60));
        updateETA('en_route',mins);
    }
}

function _haversine(lat1,lng1,lat2,lng2){
    const R=6371,toR=d=>d*Math.PI/180;
    const a=Math.sin(toR(lat2-lat1)/2)**2+Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(toR(lng2-lng1)/2)**2;
    return R*2*Math.asin(Math.sqrt(a));
}

/* ═══ POSITION LIVREUR (chargement initial) ═══ */
async function loadDriverPosition(){
    if(!order.delivery_person_id)return;
    try{
        const{data}=await db.from('delivery_tracking')
            .select('lat,lng,updated_at')
            .eq('delivery_person_id',order.delivery_person_id)
            .eq('order_id',order.id)
            .order('updated_at',{ascending:false})
            .limit(1);
        const row = data?.[0];
        if(row?.lat&&row?.lng)_updateDriverOnMap(row.lat,row.lng);
    }catch(_){}
}
/* ═══ TIMELINE ═══ */
function renderTimeline(currentStatus){
    const idx=STATUS_ORDER.indexOf(currentStatus);
    qs('timeline').innerHTML=STEPS.map((step,i)=>{
        const isDone=i<idx,isActive=i===idx;
        const cls=isDone?'done':isActive?'active':'';
        return`<div class="tl-step ${cls}">
            <div class="tl-dot">${isDone?'✓':step.icon}</div>
            <div class="tl-body">
                <div class="tl-label">${step.label}</div>
                <div class="tl-sub">${step.sub}</div>
            </div>
        </div>`;
    }).join('');
}

/* ═══ ETA BANNER ═══ */
function updateETA(status,minsLeft){
    const mainEl=qs('eta-main'),subEl=qs('eta-sub');
    if(!mainEl)return;
    if(status==='livré'){
        mainEl.textContent='🎉 Commande livrée !';
        subEl.textContent='Bon appétit !';
        return;
    }
    if(status==='en_route'&&minsLeft!==null){
        mainEl.textContent=`~${minsLeft} min`;
        subEl.textContent='Estimation d\'arrivée';
        return;
    }
    const labels={
        confirmé:'En attente du restaurant…',
        en_préparation:'En préparation',
        prêt:'Prêt — livreur en route bientôt',
        en_route:'Livreur en chemin',
    };
    mainEl.textContent=labels[status]||status;
    subEl.textContent='Mise à jour automatique';
}

/* ═══ INFOS COMMANDE ═══ */
function renderOrderInfo(){
    const o=order;
    const resto=o.restaurants||{};
    const payLabels={especes:'💵 Espèces',tmoney:'📱 TMoney',flooz:'📱 Flooz'};
    const typeLabels={sur_place:'🏪 Sur place',livraison:'🛵 Livraison'};

    const rows=[
        {icon:'🏷️',lbl:'Réf.',val:`#${o.id.substring(0,8).toUpperCase()}`,mono:true},
        {icon:'🍽️',lbl:'Restaurant',val:resto.name||'—'},
        {icon:'👤',lbl:'Nom',val:o.customer_name||'—'},
        {icon:'💳',lbl:'Paiement',val:payLabels[o.payment_method]||o.payment_method||'—'},
        {icon:'🏍️',lbl:'Type',val:typeLabels[o.delivery_type]||o.delivery_type||'—'},
        {icon:'💰',lbl:'Total',val:fmt(o.total||0),mono:true},
        ...(o.customer_address?[{icon:'📍',lbl:'Adresse',val:o.customer_address}]:[]),
    ];

    qs('order-info-rows').innerHTML=rows.map(r=>`
        <div class="info-row">
            <span class="info-icon">${r.icon}</span>
            <span class="info-lbl">${r.lbl}</span>
            <span class="info-val${r.mono?' mono':''}">${esc(String(r.val))}</span>
        </div>`).join('');

    /* Boutons de contact */
    const contacts=[];
    if(resto.whatsapp){
        const phone=String(resto.whatsapp).replace(/[^0-9+]/g,'');
        contacts.push(`<a class="btn-contact btn-wa" href="https://wa.me/${phone}" target="_blank" rel="noopener">📲 Restaurant</a>`);
    }
    if(o.customer_lat&&o.customer_lng){
        contacts.push(`<a class="btn-contact btn-maps" href="https://maps.google.com/?q=${o.customer_lat},${o.customer_lng}" target="_blank" rel="noopener">🗺️ Ma position</a>`);
    }
    qs('contact-row').innerHTML=contacts.join('');

    /* Items */
    const items=o.order_items||[];
    if(items.length){
        qs('order-info-rows').insertAdjacentHTML('beforeend',`
            <div style="margin-top:12px;padding-top:10px;border-top:.5px solid var(--line)">
                <div style="font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--dim);margin-bottom:8px;">Plats commandés</div>
                ${items.map(i=>`<div class="info-row">
                    <span class="info-icon">🍽️</span>
                    <span class="info-val">${esc(i.item_name)} <span style="color:var(--dim);">×${i.quantity}</span></span>
                    <span class="info-val mono" style="text-align:right;">${fmt(i.item_price*i.quantity)}</span>
                </div>`).join('')}
            </div>`);
    }
}

/* ═══ CHAT ═══ */
async function loadChat(){
    const el=qs('chat-msgs');
    el.innerHTML='<div style="text-align:center;color:var(--dim);font-size:.78rem;padding:10px;">Chargement…</div>';

    try{
        const{data}=await db.from('delivery_chats')
            .select('id,sender_role,sender_name,message,created_at')
            .eq('order_id',order.id)
            .in('sender_role',['livreur','client'])
            .order('created_at',{ascending:true})
            .limit(60);

        _renderMsgs(data||[]);

        if(chatChannel)db.removeChannel(chatChannel);
        chatChannel=db.channel(`tracking-chat-${order.id}`)
            .on('postgres_changes',{event:'INSERT',schema:'public',table:'delivery_chats',filter:`order_id=eq.${order.id}`},
                p=>{
                    const msgs=qs('chat-msgs');
                    msgs.appendChild(_msgEl(p.new));
                    msgs.scrollTop=msgs.scrollHeight;
                    if('vibrate' in navigator)navigator.vibrate([50]);
                })
            .subscribe();
    }catch(e){
        el.innerHTML=`<div style="text-align:center;color:var(--dim);font-size:.78rem;padding:10px;">Chat indisponible.</div>`;
    }
}

function _renderMsgs(msgs){
    const el=qs('chat-msgs');el.innerHTML='';
    if(!msgs.length){el.innerHTML='<div style="text-align:center;color:var(--dim);font-size:.78rem;padding:10px;">Aucun message. Écrivez au livreur !</div>';return;}
    msgs.forEach(m=>el.appendChild(_msgEl(m)));
    el.scrollTop=el.scrollHeight;
}

function _msgEl(m){
    const div=document.createElement('div');
    const isMine=m.sender_role==='client';
    div.className=`msg ${isMine?'mine':'theirs'}`;
    const time=new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    div.innerHTML=`<div>${esc(m.message)}</div><div class="msg-meta">${isMine?'Vous':esc(m.sender_name||'Livreur')} · ${time}</div>`;
    return div;
}

window.sendMsg=async function(){
    const inp=qs('chat-inp');
    const msg=inp.value.trim();
    if(!msg||!order)return;
    inp.value='';
    try{
        await db.from('delivery_chats').insert({
            order_id:order.id,
            sender_role:'client',
            sender_name:order.customer_name||'Client',
            message:msg,
        });
    }catch(e){toast('Erreur: '+e.message);}
};

/* ═══ REALTIME ═══ */
function startRealtime(){
    /* Statut commande */
    db.channel(`tracking-order-${order.id}`)
        .on('postgres_changes',{event:'UPDATE',schema:'public',table:'orders',filter:`id=eq.${order.id}`},
            p=>{
                const s=p.new.status;
                order.status=s;
                renderTimeline(s);
                updateETA(s,null);
                toast(s==='livré'?'🎉 Commande livrée !':'📦 Statut mis à jour : '+s);
                if('vibrate' in navigator)navigator.vibrate([80,40,80]);
            })
        .subscribe();

    /* Position GPS livreur */
    if(order.delivery_person_id){
        trackingChannel=db.channel(`tracking-gps-${order.delivery_person_id}`)
            .on('postgres_changes',{event:'*',schema:'public',table:'delivery_tracking',
                filter:`delivery_person_id=eq.${order.delivery_person_id}`},
                p=>{
                    if(p.new?.lat&&p.new?.lng)_updateDriverOnMap(p.new.lat,p.new.lng);
                })
            .subscribe();
    }
}

window.addEventListener('beforeunload',()=>{
    if(chatChannel&&db)db.removeChannel(chatChannel);
    if(trackingChannel&&db)db.removeChannel(trackingChannel);
});
</script>
